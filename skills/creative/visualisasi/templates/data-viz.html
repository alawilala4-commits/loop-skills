<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Data Visualization</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; color: white; min-height: 100vh; padding: 2rem; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    h1 { font-size: 1.25rem; font-weight: 700; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .chart-container { background: rgba(15, 23, 42, 0.5); border: 1px solid #1e293b; border-radius: 1rem; padding: 1.5rem; }
    .chart-title { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 1rem; }
    @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
    </div>
    <div class="chart-grid">
      <div class="chart-container">
        <div class="chart-title">{{CHART1_TITLE}}</div>
        <canvas id="chart1"></canvas>
      </div>
      <div class="chart-container">
        <div class="chart-title">{{CHART2_TITLE}}</div>
        <canvas id="chart2"></canvas>
      </div>
    </div>
    <p style="color: #475569; font-size: 0.7rem; text-align: center; margin-top: 1.5rem;">{{SOURCE}}</p>
  </div>
  <script>
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = '#1e293b';
    Chart.defaults.font.family = 'JetBrains Mono';

    new Chart(document.getElementById('chart1'), {
      type: 'bar',
      data: {
        labels: {{LABELS}},
        datasets: [{
          label: '{{DATASET1_LABEL}}',
          data: {{DATA1}},
          backgroundColor: {{COLORS}},
          borderColor: {{COLORS}},
          borderWidth: 1.5,
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: {{SHOW_LEGEND}} } },
        scales: {
          y: { grid: { color: '#1e293b' }, border: { color: '#334155' } },
          x: { grid: { display: false }, border: { color: '#334155' } }
        }
      }
    });

    // Add more chart2 config as needed
  </script>
</body>
</html>
