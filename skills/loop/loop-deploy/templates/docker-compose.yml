version: '3.9'

# Template: Docker Compose (Multi-service stack)
# Usage: Copy & adapt for your project
# Run: docker-compose up -d

services:
  # 1. WEB APPLICATION (Node.js / TypeScript)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@db:5432/appdb
      - REDIS_URL=redis://redis:6379
      - API_PORT=3000
      - LOG_LEVEL=info
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 2. DATABASE (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: app-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. CACHE (Redis)
  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. MESSAGE QUEUE (Optional: RabbitMQ)
  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: app-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # 5. MONITORING (Optional: Prometheus)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: app-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus-data:/prometheus
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  # prometheus-data:
  #   driver: local

networks:
  app-network:
    driver: bridge

# CHECKLIST
# ✓ Multiple services (web, db, redis)
# ✓ Environment variables
# ✓ Volume mounting (persistent data)
# ✓ Port mapping
# ✓ Health checks
# ✓ Dependencies (depends_on)
# ✓ Restart policies
# ✓ Network isolation
# ✓ Comments for optional services

# COMMON COMMANDS
# docker-compose up -d         — Start all services
# docker-compose down          — Stop & remove containers
# docker-compose logs -f web   — View logs
# docker-compose exec db psql  — Access database
# docker-compose restart       — Restart services
